<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Evaluacion Diagnostica - QA Learn</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/frontend/styles/platform.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script>tailwind.config={theme:{extend:{colors:{navy:"#1E3A5F",royal:"#2E4FBA",bright:"#3B5BDB",sky:"#EEF2FB",ink:"#1A1A2E",muted:"#4A5073",border:"#D0D9F0",pass:"#2D9B6F",fail:"#C0392B",warn:"#D4A017"},fontFamily:{sans:["Plus Jakarta Sans","sans-serif"]}}}}</script>
  <style>
    @keyframes fade-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .fade-in{animation:fade-in 0.4s ease forwards}
  </style>
</head>
<body class="font-sans bg-sky min-h-screen antialiased">
<header class="bg-white border-b border-border sticky top-0 z-40">
  <div class="max-w-6xl mx-auto px-6 h-14 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background:#3B5BDB"><svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>
      <div><p class="text-xs text-muted font-medium leading-none">QA Learn</p><p class="text-sm font-bold text-navy leading-none mt-0.5">Evaluacion Diagnostica</p></div>
    </div>
    <div class="flex items-center gap-2">
      <div id="user-initials" class="w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-bold" style="background:#3B5BDB">U</div>
      <span id="user-name" class="text-sm font-medium text-navy hidden md:block">Cargando...</span>
    </div>
  </div>
  <div class="h-1.5 bg-border"><div id="progress-bar" class="h-full rounded-r-full transition-all duration-500" style="width:0%;background:linear-gradient(90deg,#3B5BDB,#2D9B6F)"></div></div>
  <div class="max-w-6xl mx-auto px-6 py-1.5 flex justify-between">
    <span class="text-xs text-muted">Pregunta <span id="q-current">1</span> de 20</span>
    <span class="text-xs font-semibold" style="color:#3B5BDB" id="pct-label">0% completado</span>
  </div>
</header>
<div class="max-w-6xl mx-auto px-4 py-8 flex gap-6">
  <aside class="w-64 flex-shrink-0">
    <div class="bg-white rounded-2xl border border-border p-5 sticky top-36">
      <p class="text-xs font-bold text-navy uppercase tracking-wider mb-1">Navegador de preguntas</p>
      <p class="text-xs text-muted mb-4">Ir a cualquier pregunta</p>
      <div id="question-grid" class="grid grid-cols-5 gap-2 mb-5"></div>
      <div class="space-y-2 pt-4 border-t border-border">
        <div class="flex items-center gap-2"><div class="w-6 h-6 rounded-md flex items-center justify-center text-white text-xs font-bold" style="background:#3B5BDB">V</div><span class="text-xs text-muted">Completado</span></div>
        <div class="flex items-center gap-2"><div class="w-6 h-6 rounded-md bg-white flex items-center justify-center text-xs font-bold" style="border:2px solid #3B5BDB;color:#3B5BDB">1</div><span class="text-xs text-muted">Actual</span></div>
        <div class="flex items-center gap-2"><div class="w-6 h-6 rounded-md flex items-center justify-center text-xs text-muted font-medium" style="background:#EEF2FB">2</div><span class="text-xs text-muted">No visitado</span></div>
      </div>
    </div>
  </aside>
  <main class="flex-1 min-w-0">
    <div id="question-card" class="bg-white rounded-2xl border border-border p-8 fade-in"></div>
    <div class="flex items-center justify-between mt-6 px-1">
      <button onclick="prevQ()" class="flex items-center gap-2 px-5 py-3 rounded-xl text-sm font-semibold transition-all" style="border:2px solid #D0D9F0;color:#4A5073">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
        Pregunta anterior
      </button>
      <button onclick="skipQ()" class="text-sm text-muted hover:text-navy transition-colors font-medium">Omitir por ahora</button>
      <button id="next-btn" onclick="nextQ()" disabled class="flex items-center gap-2 px-6 py-3 rounded-xl text-sm font-bold transition-all" style="background:#D0D9F0;color:#4A5073;cursor:not-allowed">
        <span id="next-label">Siguiente pregunta</span>
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>
      </button>
    </div>
  </main>
</div>
<footer class="mt-8 py-4 border-t border-border">
  <div class="max-w-6xl mx-auto px-6 flex justify-between">
    <p class="text-xs text-muted">QA Learn. Evaluacion diagnostica.</p>
    <div class="flex gap-4"><a href="#" class="text-xs text-muted hover:text-navy">Directrices</a><a href="#" class="text-xs text-muted hover:text-navy">Soporte tecnico</a></div>
  </div>
</footer>
<div id="complete-modal" class="hidden fixed inset-0 z-50 items-center justify-center p-4" style="background:rgba(30,58,95,0.5)">
  <div class="bg-white rounded-2xl p-8 max-w-md w-full text-center shadow-2xl fade-in">
    <div class="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4" style="background:#2D9B6F">
      <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
    </div>
    <h3 class="text-2xl font-extrabold text-navy mb-2">Diagnostico completado!</h3>
    <p class="text-muted text-sm mb-2">Procesando tu resultado...</p>
    <p id="modal-score" class="text-3xl font-extrabold mb-4" style="color:#3B5BDB"></p>
    <div id="modal-dots" class="flex justify-center gap-1.5 mb-6">
      <div class="w-2 h-2 rounded-full bg-bright animate-bounce"></div>
      <div class="w-2 h-2 rounded-full bg-bright animate-bounce" style="animation-delay:0.15s"></div>
      <div class="w-2 h-2 rounded-full bg-bright animate-bounce" style="animation-delay:0.3s"></div>
    </div>
    <button onclick="goResult()" class="w-full py-3.5 rounded-xl text-white font-bold" style="background:#3B5BDB">Ver mi resultado</button>
  </div>
</div>
<script src="./diagnostic.js"></script>
<script src="/frontend/scripts/views/theme.js"></script>
</body>
</html>
