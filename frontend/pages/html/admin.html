<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — QA Learn</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/frontend/styles/responsive.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F3F4F8; color: #1A1A2E; display: flex; height: 100vh; overflow: hidden; }

    /* SIDEBAR */
    .sidebar { width: 220px; flex-shrink: 0; background: #1E3A5F; display: flex; flex-direction: column; }
    .sidebar-logo { padding: 20px; border-bottom: 1px solid rgba(255,255,255,.1); }
    .sidebar-logo h1 { font-size: 15px; font-weight: 800; color: white; }
    .sidebar-logo p  { font-size: 11px; color: rgba(255,255,255,.5); margin-top: 2px; }
    .sidebar-nav { flex: 1; padding: 12px 8px; }
    .nav-link {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 10px; cursor: pointer;
      font-size: 13px; font-weight: 600; color: rgba(255,255,255,.6);
      transition: all .15s; margin-bottom: 4px; border: none; background: none; width: 100%; text-align: left;
    }
    .nav-link:hover  { background: rgba(255,255,255,.08); color: white; }
    .nav-link.active { background: rgba(255,255,255,.15); color: white; }
    .sidebar-footer { padding: 14px; border-top: 1px solid rgba(255,255,255,.1); display: flex; align-items: center; gap: 10px; }
    .admin-avatar { width: 32px; height: 32px; border-radius: 50%; background: #3B5BDB; color: white; font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .admin-name  { font-size: 12px; font-weight: 700; color: white; }
    .admin-role  { font-size: 11px; color: rgba(255,255,255,.5); }

    /* MAIN */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .topbar { height: 56px; background: white; border-bottom: 1px solid #E5E7EB; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; flex-shrink: 0; }
    .topbar h2 { font-size: 15px; font-weight: 800; color: #1E3A5F; }
    .content { flex: 1; overflow-y: auto; padding: 24px; }

    button:focus { outline: none; }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <h1>QA Learn</h1>
    <p>Admin Console</p>
  </div>
  <nav class="sidebar-nav">
    <button class="nav-link active" data-view="dashboard" onclick="navigate('dashboard')">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Dashboard
    </button>
    <button class="nav-link" data-view="users" onclick="navigate('users')">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
      Usuarios
    </button>
    <button class="nav-link" data-view="library" onclick="navigate('library')">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      Repositorio
    </button>
    <button class="nav-link" data-view="courses" onclick="navigate('courses')">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
      Cursos
    </button>
  </nav>
  <div class="sidebar-footer">
    <div class="admin-avatar" id="adminInitial">A</div>
    <div style="flex:1;min-width:0;">
      <div class="admin-name" id="adminName">Admin</div>
      <div class="admin-role">Administrador</div>
    </div>
    <button onclick="logout()" style="background:none;border:none;cursor:pointer;color:rgba(255,255,255,.5);" title="Cerrar sesión">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
    </button>
  </div>
</aside>

<!-- MAIN -->
<div class="main">
  <header class="topbar">
    <h2>Admin Management Console</h2>
    <span style="font-size:12px;color:#6B7280">QA Learn Platform</span>
  </header>
  <div class="content" id="content"></div>
</div>

<script src="/frontend/js/users/admin.js"></script>
</body>
</html>
