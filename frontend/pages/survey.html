<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evaluación Diagnóstica — QA Learn</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/frontend/styles/survey.css">
</head>

<body>

<!-- HEADER -->
<header class="header">
  <div class="header-left">
    <div class="header-logo">
      <svg fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
    </div>
    <div>
      <div class="header-title">QA Learn</div>
      <div class="header-sub">Evaluación Diagnóstica</div>
    </div>
  </div>
  <div class="header-user">
    <div class="avatar" id="avatarInitial">U</div>
    <span class="avatar-name" id="userName">Usuario Demo</span>
  </div>
</header>

<!-- PROGRESS -->
<div class="progress-wrap">
  <span class="progress-label" id="progressLabel">Pregunta 1 de 20</span>
  <span class="progress-pct" id="progressPct">0% completado</span>
</div>
<div class="progress-outer" style="position:relative;">
  <div class="progress-bar-bg"></div>
  <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- NAVIGATOR -->
  <aside class="navigator">
    <h3>Navegador de Preguntas</h3>
    <p>Ir a cualquier pregunta</p>
    <div class="nav-grid" id="navigator"></div>
    <div class="nav-legend">
      <div class="nav-legend-item">
        <div class="nav-legend-dot" style="background:var(--bright)"></div> Completado
      </div>
      <div class="nav-legend-item">
        <div class="nav-legend-dot" style="background:white;border:2px solid var(--bright)"></div> Actual
      </div>
      <div class="nav-legend-item">
        <div class="nav-legend-dot" style="background:white;border:1.5px solid var(--border)"></div> No visitado
      </div>
    </div>
  </aside>

  <!-- QUESTION -->
  <div class="question-card">
    <div class="q-meta">
      <span class="q-label" id="qLabel">Pregunta 01</span>
      <span class="q-tag">QA · Principios de Software</span>
    </div>
    <h2 class="q-title" id="questionTitle"></h2>
    <div class="options" id="options"></div>

    <div class="card-footer">
      <button class="btn btn-ghost" id="prevBtn">← Pregunta anterior</button>
      <button class="btn-skip" id="skipBtn">Omitir por ahora</button>
      <div style="display:flex;gap:10px;">
        <button class="btn btn-next" id="nextBtn">Siguiente pregunta →</button>
        <button class="btn btn-submit hidden" id="submitBtn">✓ Finalizar evaluación</button>
      </div>
    </div>
  </div>

</div>

<!-- PAGE FOOTER -->
<footer class="page-footer">
  <span>© QA Learn 2024. Evaluación diagnóstica.</span>
  <div style="display:flex;gap:20px;">
    <a href="#">Directrices</a>
    <a href="#">Soporte técnico</a>
  </div>
</footer>

<script src="/frontend/js/survey.js"></script>
</body>
</html>
