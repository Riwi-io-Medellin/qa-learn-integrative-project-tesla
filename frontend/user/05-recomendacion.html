<!DOCTYPE html>
<html lang="es"><head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tu Ruta Recomendada — QA Learn</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../styles/custom.css"/>
  <script>tailwind.config={theme:{extend:{colors:{navy:"#1E3A5F",bright:"#3B5BDB",sky:"#EEF2FB",muted:"#4A5073",border:"#D0D9F0",pass:"#2D9B6F"},fontFamily:{sans:["Plus Jakarta Sans","sans-serif"]}}}}</script>
  <style>@keyframes fade-up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}.fade-up-1{animation:fade-up .6s .1s ease forwards;opacity:0}.fade-up-2{animation:fade-up .6s .25s ease forwards;opacity:0}.fade-up-3{animation:fade-up .6s .4s ease forwards;opacity:0}@keyframes pop{0%{transform:scale(.5);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}.pop{animation:pop .5s ease forwards;opacity:0}</style>
</head>
<body class="font-sans antialiased" style="background:#EEF2FB;min-height:100vh">

  <header style="background:#fff;border-bottom:1px solid #D0D9F0">
    <div style="max-width:880px;margin:0 auto;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between">
      <div style="display:flex;align-items:center;gap:8px">
        <div style="width:28px;height:28px;border-radius:7px;background:#3B5BDB;display:flex;align-items:center;justify-content:center"><svg style="width:14px;height:14px;color:white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>
        <span style="font-weight:700;color:#1E3A5F;font-size:14px">QA Learn</span>
      </div>
      <span style="font-size:13px;color:#4A5073">Hola, <span id="user-name" style="font-weight:600;color:#1E3A5F">—</span></span>
    </div>
  </header>

  <div style="max-width:680px;margin:0 auto;padding:36px 16px">

    <!-- Sin diagnóstico -->
    <div id="no-diag" class="hidden" style="background:#fff;border-radius:18px;border:1px solid #D0D9F0;padding:40px;text-align:center">
      <p style="font-size:16px;font-weight:700;color:#1E3A5F;margin-bottom:8px">No tienes un diagnóstico todavía</p>
      <p style="font-size:13px;color:#4A5073;margin-bottom:20px">Completa la evaluación para recibir tu ruta personalizada.</p>
      <a href="04-diagnostico.html" style="display:inline-block;background:#3B5BDB;color:white;font-weight:700;font-size:13px;padding:10px 22px;border-radius:11px;text-decoration:none">Ir al diagnóstico →</a>
    </div>

    <!-- Resultado -->
    <div id="result-content" class="hidden" style="background:#fff;border-radius:22px;border:1px solid #D0D9F0;overflow:hidden;box-shadow:0 24px 64px rgba(30,58,95,0.10)">
      <div style="padding:32px;text-align:center;background:linear-gradient(135deg,#1E3A5F 0%,#2E4FBA 100%)">
        <div style="width:60px;height:60px;border-radius:50%;background:#2D9B6F;display:flex;align-items:center;justify-content:center;margin:0 auto 16px" class="pop">
          <svg style="width:30px;height:30px;color:white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
        </div>
        <h1 style="font-size:22px;font-weight:800;color:white;margin-bottom:6px" class="fade-up-1">¡Diagnóstico completado!</h1>
        <p style="font-size:13px;color:rgba(255,255,255,0.6)" class="fade-up-2">Analizamos tus respuestas y determinamos tu nivel en QA Testing</p>
      </div>
      <div style="padding:28px">
        <!-- Score + nivel -->
        <div style="display:flex;align-items:center;gap:28px;margin-bottom:24px" class="fade-up-2">
          <div style="position:relative;width:120px;height:120px;flex-shrink:0">
            <svg style="width:100%;height:100%;transform:rotate(-90deg)" viewBox="0 0 120 120">
              <circle cx="60" cy="60" r="54" fill="none" stroke="#EEF2FB" stroke-width="12"/>
              <circle id="score-arc" cx="60" cy="60" r="54" fill="none" stroke="#3B5BDB" stroke-width="12" stroke-linecap="round" style="stroke-dasharray:339;stroke-dashoffset:339;transition:stroke-dashoffset 1.2s ease"/>
            </svg>
            <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
              <span id="score-value" style="font-size:26px;font-weight:800;color:#1E3A5F">—</span>
              <span style="font-size:11px;color:#4A5073;font-weight:500">diagnóstico</span>
            </div>
          </div>
          <div style="flex:1">
            <p style="font-size:11px;font-weight:700;color:#4A5073;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Tu nivel detectado</p>
            <div id="level-badge" style="display:inline-flex;align-items:center;padding:8px 18px;border-radius:11px;background:#3B5BDB;color:white;font-weight:800;font-size:14px;margin-bottom:10px">—</div>
            <p id="level-desc" style="font-size:13px;color:#4A5073;line-height:1.6"></p>
            <p id="correct-stat" style="font-size:12px;color:#4A5073;margin-top:6px;font-weight:500"></p>
          </div>
        </div>
        <div style="border-top:1px solid #D0D9F0;margin-bottom:20px"></div>
        <!-- Ruta -->
        <div class="fade-up-3">
          <p style="font-size:11px;font-weight:700;color:#4A5073;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Tu ruta recomendada</p>
          <h2 id="route-name" style="font-size:19px;font-weight:800;color:#1E3A5F;margin-bottom:16px">—</h2>
          <div id="route-courses" style="display:flex;flex-direction:column;gap:10px">
            <div style="height:52px;border-radius:12px;background:#EEF2FB" class="skeleton"></div>
            <div style="height:52px;border-radius:12px;background:#EEF2FB" class="skeleton"></div>
          </div>
        </div>
        <div style="border-top:1px solid #D0D9F0;margin:20px 0"></div>
        <button id="start-btn" style="width:100%;padding:16px;border-radius:12px;color:white;font-weight:700;font-size:14px;border:none;cursor:pointer;background:linear-gradient(90deg,#3B5BDB,#2D9B6F)" class="fade-up-3">
          Comenzar mi ruta de aprendizaje →
        </button>
      </div>
    </div>
  </div>
  <script type="module" src="../scripts/views/05-recomendacion.js"></script>
</body></html>
