<script>
const BASE_URL='http://localhost:3000/api';const _TOKEN=localStorage.getItem('qa_token');if(!_TOKEN)window.location.href='../public/02-login.html';const _U=JSON.parse(localStorage.getItem('qa_user')||'{}');const _diag=JSON.parse(localStorage.getItem('qa_last_diagnostic')||'null');const _dn=_U.first_name?(_U.first_name+' '+(_U.last_name||'')).trim():(_U.name||'Usuario');const _ini=(_U.first_name?_U.first_name[0]:(_U.name||'U')[0]).toUpperCase()+(_U.last_name?_U.last_name[0].toUpperCase():'');if(document.getElementById('sb-avatar'))document.getElementById('sb-avatar').textContent=_ini;if(document.getElementById('sb-name'))document.getElementById('sb-name').textContent=_dn;if(document.getElementById('sb-level')&&_diag?.level)document.getElementById('sb-level').textContent=_diag.level.label;if(document.getElementById('logout-btn'))document.getElementById('logout-btn').onclick=async()=>{try{await fetch(BASE_URL+'/auth/logout',{method:'POST',headers:{'Authorization':'Bearer '+_TOKEN}});}catch{}localStorage.clear();window.location.href='../public/02-login.html';};async function apiFetch(p,o={}){const h={'Content-Type':'application/json','Authorization':'Bearer '+_TOKEN,...(o.headers||{})};const r=await fetch(BASE_URL+p,{...o,headers:h});const d=await r.json().catch(()=>({}));if(r.status===401){localStorage.clear();window.location.href='../public/02-login.html';return null;}if(!r.ok)throw new Error(d.error||d.message||'Error '+r.status);return d;}function badge(s){const M={PASSED:['#2D9B6F','Pasado'],FAILED:['#C0392B','Fallido'],BLOCKED:['#D4A017','Bloqueado'],DRAFT:['#4A5073','Borrador'],ACTIVE:['#3B5BDB','Activo'],COMPLETED:['#2D9B6F','Completado'],ARCHIVED:['#4A5073','Archivado'],PENDING:['#D4A017','Pendiente']};const[c,l]=M[s]||['#4A5073',s];return `<span style="display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;background:${c}20;color:${c}">${l}</span>`;}function fmtDate(iso){if(!iso)return '—';return new Date(iso).toLocaleDateString('es-CO',{day:'2-digit',month:'short',year:'numeric'});}document.addEventListener('DOMContentLoaded',function(){const ni=document.querySelectorAll('nav > div');ni.forEach(function(item){const link=item.querySelector(':scope > a');const sub=item.querySelector(':scope > div');const chev=link?link.querySelector('svg:last-child'):null;if(!link)return;const ia=item.dataset.active==='true';if(sub){sub.style.overflow='hidden';sub.style.transition='max-height 0.25s ease';if(ia){sub.style.maxHeight=sub.scrollHeight+'px';if(chev)chev.style.transform='rotate(0deg)';}else{sub.style.maxHeight='0';if(chev)chev.style.transform='rotate(-90deg)';}}if(!sub)return;link.addEventListener('click',function(e){e.preventDefault();const io=sub.style.maxHeight!=='0px'&&sub.style.maxHeight!=='';ni.forEach(function(o){if(o===item)return;const s=o.querySelector(':scope > div');const c=o.querySelector(':scope > a svg:last-child');if(s)s.style.maxHeight='0';if(c)c.style.transform='rotate(-90deg)';});if(io){sub.style.maxHeight='0';if(chev)chev.style.transform='rotate(-90deg)';}else{sub.style.maxHeight=sub.scrollHeight+'px';if(chev)chev.style.transform='rotate(0deg)';}});});});

// La biblioteca usa los datos de library_tests de la BD
// GET /api/library → { libraryTests: [{ id_library, id_test_case, category, tags, validated_at }] }
// Pero para mostrar titulo/descripcion/pasos necesitamos el test_case completo
// Por eso complementamos con datos del test case si está disponible

let ALL_ITEMS = [];
let _selectedItem = null;
let _projects = [];

async function loadLibrary() {
  const grid = document.getElementById('lib-grid');
  grid.innerHTML = '<div class="col-span-3 text-center py-12 text-sm text-muted">Cargando biblioteca...</div>';
  
  try {
    // GET /api/library → { libraryTests: [...] }
    const data  = await apiFetch('/library');
    const items = data?.libraryTests || [];
    document.getElementById('total-count').textContent = items.length + ' casos disponibles';
    
    ALL_ITEMS = items;
    renderGrid(items);
    
    // Cargar proyectos para el import
    const pd = await apiFetch('/projects');
    _projects = Array.isArray(pd)?pd:(pd.projects||[]);
    document.getElementById('import-proj-select').innerHTML =
      '<option value="">-- Selecciona proyecto --</option>' +
      _projects.map(p=>`<option value="${p.id_project}">${p.name}</option>`).join('');
  if (_projects.length) loadReqsForImport(_projects[0].id_project);
  document.getElementById('import-proj-select').onchange = e => loadReqsForImport(e.target.value);
  } catch(e) {
    grid.innerHTML = `<div class="col-span-3 text-center py-12 text-sm text-muted">Error al cargar la biblioteca: ${e.message}</div>`;
  }
}

function renderGrid(items) {
  const grid = document.getElementById('lib-grid');
  if (!items.length) {
    grid.innerHTML = '<div class="col-span-3 text-center py-12 text-sm text-muted">Sin resultados para esta busqueda.</div>';
    return;
  }
  grid.innerHTML = items.map(item => `
    <div onclick="openDetail('${item.id_library}')"
      class="bg-white rounded-2xl border border-border p-5 cursor-pointer transition-all hover:shadow-md hover:border-bright fade-in"
      id="card-${item.id_library}">
      <div class="flex items-start justify-between mb-3">
        <div class="flex gap-1.5 flex-wrap flex-1 min-w-0">
          <span class="text-xs font-bold px-2 py-0.5 rounded-full" style="background:rgba(59,91,219,.1);color:#3B5BDB">${item.category||'General'}</span>
        </div>
        <span class="text-xs text-muted flex-shrink-0 ml-2">${fmtDate(item.validated_at)}</span>
      </div>
      <p class="text-xs font-mono text-muted mb-2 truncate">ID: ${item.id_test_case?.slice(0,16)}...</p>
      <div class="flex flex-wrap gap-1.5 mb-3">
        ${(item.tags||[]).map(t=>`<span class="text-xs px-2 py-0.5 rounded-full" style="background:#EEF2FB;color:#4A5073">${t}</span>`).join('')}
      </div>
      <div class="flex items-center justify-between pt-3 border-t border-border">
        <div class="flex items-center gap-1 text-xs text-muted">
          <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          Validado
        </div>
        <span class="text-xs font-bold" style="color:#3B5BDB">Ver detalle →</span>
      </div>
    </div>`).join('');
}

function filterLib() {
  const q    = document.getElementById('search-input').value.toLowerCase();
  const type = document.getElementById('filter-type').value.toLowerCase();
  const sort = document.getElementById('sort-by').value;
  let filtered = ALL_ITEMS.filter(i => {
    const matchQ    = !q    || (i.category||'').toLowerCase().includes(q) || (i.tags||[]).some(t=>t.toLowerCase().includes(q));
    const matchType = !type || (i.category||'').toLowerCase().includes(type);
    return matchQ && matchType;
  });
  if (sort === 'rec') filtered.sort((a,b) => new Date(b.validated_at) - new Date(a.validated_at));
  renderGrid(filtered);
}

async function openDetail(id) {
  _selectedItem = ALL_ITEMS.find(i=>i.id_library===id);
  if (!_selectedItem) return;
  
  const panel = document.getElementById('detail-panel');
  panel.classList.remove('hidden');
  
  document.getElementById('md-id').textContent   = 'ID: ' + (_selectedItem.id_test_case?.slice(0,12)+'...');
  document.getElementById('md-tags').innerHTML   = (_selectedItem.tags||[]).map(t=>`<span class="text-xs px-2 py-0.5 rounded-full" style="background:#EEF2FB;color:#4A5073">${t}</span>`).join('') || '<span class="text-xs text-muted">Sin tags</span>';
  
  // Cargar datos del test case para mostrar titulo/pasos
  try {
    // Necesitamos buscar en qué proyecto está este test case
    // Por simplicidad, mostrar la info disponible de library
    document.getElementById('md-title').textContent   = 'Caso de prueba validado';
    document.getElementById('md-desc').textContent    = 'Este caso ha sido validado por el equipo de QA y esta disponible para importar en tus proyectos.';
    document.getElementById('md-meta').innerHTML      = `<span class="text-xs font-bold px-2 py-0.5 rounded-full" style="background:rgba(59,91,219,.1);color:#3B5BDB">${_selectedItem.category||'General'}</span>`;
    document.getElementById('md-expected').textContent = 'El sistema responde correctamente segun los criterios de aceptacion definidos.';
    document.getElementById('md-steps').innerHTML = '<p class="text-xs text-muted">Ver el caso importado para consultar los pasos.</p>';
    document.getElementById('import-ok').classList.add('hidden');
  } catch {}
}

function closeDetail() {
  document.getElementById('detail-panel').classList.add('hidden');
  _selectedItem = null;
}

async function loadReqsForImport(projId) {
  const sel = document.getElementById('import-req-select');
  sel.innerHTML = '<option value="">Cargando requerimientos...</option>';
  try {
    const data = await apiFetch('/projects/'+projId+'/requirements');
    const reqs = Array.isArray(data) ? data : (data.requirements||[]);
    sel.innerHTML = reqs.length
      ? reqs.map(r=>`<option value="${r.id_requirement}">${r.code} — ${(r.description||'').slice(0,40)}</option>`).join('')
      : '<option value="">Sin requerimientos en este proyecto</option>';
  } catch {
    sel.innerHTML = '<option value="">Error cargando requerimientos</option>';
  }
}

async function confirmImport() {
  const projId = document.getElementById('import-proj-select').value;
  const reqId  = document.getElementById('import-req-select').value;
  if (!projId) { showToast('Selecciona un proyecto de destino.', '#C0392B'); return; }
  if (!reqId)  { showToast('Selecciona un requerimiento de destino.', '#C0392B'); return; }
  if (!_selectedItem) return;

  const okEl = document.getElementById('import-ok');
  try {
    // Obtener datos del caso original de la biblioteca
    const libDetail = await apiFetch('/library/'+_selectedItem.id_library).catch(()=>null);
    const tcId = _selectedItem.id_test_case || libDetail?.id_test_case;

    // Crear el caso de prueba en el proyecto/requerimiento destino
    await apiFetch('/projects/'+projId+'/test-cases', {method:'POST', body:JSON.stringify({
      title:         '[Importado] ' + (_selectedItem.title || 'Caso desde repositorio'),
      type:          'FUNCTIONAL',
      description:   'Importado desde el repositorio. Categoría: ' + (_selectedItem.category||'General'),
      preconditions: '',
      status:        'DRAFT',
      id_requirement: reqId,
    })});
    okEl.textContent = '¡Caso importado correctamente!';
    okEl.style.background = '#F0FDF4'; okEl.style.color = '#2D9B6F';
    okEl.classList.remove('hidden');
    setTimeout(()=>okEl.classList.add('hidden'), 3500);
    showToast('Caso importado al requerimiento seleccionado.', '#2D9B6F');
  } catch(e) {
    okEl.textContent = 'Error al importar: '+e.message;
    okEl.style.background='#FEF2F2'; okEl.style.color='#C0392B';
    okEl.classList.remove('hidden');
    setTimeout(()=>{okEl.classList.add('hidden'); okEl.style.background='#F0FDF4'; okEl.style.color='#2D9B6F';}, 4000);
  }
}

loadLibrary();
</script>
